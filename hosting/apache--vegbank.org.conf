# This is the apache conf file used by the vegbank.org VM. It is located on the
# server at /etc/apache2/sites-enabled/vegbank.org.conf
# 
<VirtualHost *:80>
        ServerAdmin webmaster@nceas.ucsb.edu
        ServerName vegbank.org
        ServerAlias prod.vegbank.org
        ServerAlias www.vegbank.org
        ServerSignature Off
        #LogLevel alert rewrite:trace3
        CustomLog /var/log/apache2/prod.vegbank.org-access.log combined
        ErrorLog /var/log/apache2/prod.vegbank.org-error.log

        DocumentRoot /var/www/vegbank.org

        RewriteEngine On

        # 1. EXCEPTION: If the URI starts with /.well-known/acme-challenge/, do NOT redirect
        RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/ [NC]

        # 2. REDIRECT: Everything else goes to HTTPS
        RewriteRule ^(.*)$ https://vegbank.org$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
        ServerAdmin webmaster@nceas.ucsb.edu
        ServerName vegbank.org
        ServerAlias prod.vegbank.org
        ServerAlias www.vegbank.org
        ServerSignature Off
        CustomLog /var/log/apache2/prod.vegbank.org-access.log combined
        ErrorLog /var/log/apache2/prod.vegbank.org-error.log
        DocumentRoot /var/www/vegbank.org

        <Proxy *>
            allow from localhost
        </Proxy>

        RewriteEngine On

        # Block known bad bots by user agent - return 403 before hitting Shiny
        # SemrushBot — Semrush, a commercial SEO/marketing analytics company. Crawls sites to
        #              sell competitive intelligence data to marketers.
        # DotBot     — Moz, another SEO analytics company (makers of the Open Site Explorer tool).
        #              Same deal — crawling to sell data.
        # AhrefsBot  — Ahrefs, yet another commercial SEO analytics company. One of the most
        #              aggressive crawlers on the web.
        # GPTBot     — OpenAI. Crawling to collect training data for their AI models.
        # ClaudeBot  — Anthropic. Same purpose — AI training data collection.
        RewriteCond %{HTTP_USER_AGENT} "SemrushBot|DotBot|AhrefsBot|GPTBot|ClaudeBot" [NC]
        RewriteRule ^ - [F,L]

        # Baidu — the dominant Chinese search engine (roughly China's equivalent of Google).
        # Baiduspider is their web crawler, indexing pages for baidu.com search results.
        # Block IP ranges responsible for bulk scraping by Baidu.
        RewriteCond %{REMOTE_ADDR} "^119\.249\." [OR]
        RewriteCond %{REMOTE_ADDR} "^220\.181\." [OR]
        RewriteCond %{REMOTE_ADDR} "^116\.179\."
        RewriteRule ^ - [F,L]
        # Baidu also uses additional IPs that identify as 'Baiduspider' user agent, so
        # Baidu will be able to index the new site, even with the following rewrites in place.
        # However, it's still trying to index /vegbank/... and /get/..., so those URI prefixes
        # have also been filtered out below

        # Serve robots.txt directly from DocumentRoot, bypassing Shiny proxy
        ProxyPass /robots.txt !

        # Block legacy VegBank and API paths from ever reaching Shiny
        ProxyPass /vegbank/ !
        ProxyPass /get/ !

        RewriteCond %{HTTP:Upgrade} =websocket [NC]
        RewriteCond %{REQUEST_URI} !^/robots\.txt$ [NC]
        RewriteCond %{REQUEST_URI} !^/vegbank/ [NC]
        RewriteCond %{REQUEST_URI} !^/get/ [NC]
        RewriteRule ^/(.*) ws://localhost:3838/$1 [P,L]
        RewriteCond %{HTTP:Upgrade} !=websocket
        RewriteCond %{REQUEST_URI} !^/robots\.txt$ [NC]
        RewriteCond %{REQUEST_URI} !^/vegbank/ [NC]
        RewriteCond %{REQUEST_URI} !^/get/ [NC]
        RewriteRule /(.*) http://localhost:3838/$1 [P,L]
        ProxyPass / http://localhost:3838/
        ProxyPassReverse / http://localhost:3838/
        ProxyRequests Off

        SSLEngine on
        SSLCertificateFile      /etc/letsencrypt/live/prod.vegbank.org/cert.pem
        SSLCertificateKeyFile   /etc/letsencrypt/live/prod.vegbank.org/privkey.pem
        SSLCertificateChainFile /etc/letsencrypt/live/prod.vegbank.org/chain.pem
        SSLCACertificateFile    /etc/ssl/certs/ca-certificates.crt
</VirtualHost>
